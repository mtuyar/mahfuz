name: "Feature Request"
description: "Suggest a new feature or improvement."
title: "[Feature] "
labels: ["enhancement", "suggestion"]
body:
  - type: markdown
    attributes:
      value: |
        ## Feature Request

        We'd love to hear your ideas for making Mahfuz better. Please share your suggestion by filling out the form below.

  - type: input
    id: summary
    attributes:
      label: "Summary"
      description: "Summarize your suggestion in one sentence"
      placeholder: "e.g. Add a tafsir panel to the surah page"
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: "Category"
      description: "Which area does your suggestion relate to?"
      options:
        - "Reading experience"
        - "Audio / Listening"
        - "Memorization"
        - "UI / Design"
        - "Performance"
        - "Accessibility"
        - "Mobile app"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Detailed Description"
      description: "Describe your suggestion in detail. What problem does it solve or what need does it address?"
      placeholder: |
        - What do you want to accomplish?
        - Is this currently impossible, or is the existing method insufficient?
        - How important is this feature to you?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives"
      description: "Any alternative solutions you've considered"
      placeholder: "Currently I work around this by ..."
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: "References / Examples"
      description: "If you've seen a similar feature in another app, please share"
      placeholder: "e.g. Similar to the ... feature in X app"
    validations:
      required: false
